  <script>
    function reportStartupError (value) {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/report-startup-error', true);
      xhr.setRequestHeader('Content-Type', 'application/json;charset=UTF-8');
      xhr.send(JSON.stringify(value));
    }

    function handleSmoStartupError (event, eventType = 'error') {
      let message = 'unknown error';
      if (event.message) {
        message = event.message;
      } else if (event.target && event.target.outerHTML) {
        message = 'error with ' + event.target.outerHTML;
      }
      console.error(event);
      reportStartupError({ message: message, filename: event.filename, lineno: event.lineno, colno: event.colno, eventType, source: 'index.html' });
    }

    function handleUnhandledSmoStartupRejection (event) {
      handleSmoStartupError(event.reason, 'unhandledrejection');
    }

    window.addEventListener('error', handleSmoStartupError, true);
    window.addEventListener('unhandledrejection', handleUnhandledSmoStartupRejection);
  </script>
